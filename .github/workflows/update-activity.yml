name: Update Repo List
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Update README with Repo List
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TRACK_ACTIVITIES }}
        run: |
          # 1. Fetch the data using GitHub CLI
          REPOS=$(gh repo list --limit 5 --json name,url,updatedAt --template '{{range .}}* [{{.name}}]({{.url}}) - _Updated {{.updatedAt}}_\n{{end}}')
          
          # 2. Use Python to safely swap the content between the tags
          python3 -c "
          import os
          repos = os.getenv('REPOS', 'No recent activity found.')
          with open('README.md', 'r') as f:
              content = f.read()
          
          start_tag = '<!-- [START_REPO_LIST] -->'
          end_tag = '<!-- [END_REPO_LIST] -->'
          
          start_idx = content.find(start_tag) + len(start_tag)
          end_idx = content.find(end_tag)
          
          if start_idx != -1 and end_idx != -1:
              new_content = content[:start_idx] + '\n' + repos + '\n' + content[end_idx:]
              with open('README.md', 'w') as f:
                  f.write(new_content)
          "
          
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update recent projects list [skip ci]" || exit 0
          git push
