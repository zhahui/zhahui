name: Update Repo List

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Recent Repositories
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TRACK_ACTIVITIES }}
        run: |
          # Fetch raw JSON data (much more reliable than templates)
          REPOS_JSON=$(gh repo list --limit 5 --source --json name,url,updatedAt)
          
          # Export the raw JSON to the environment
          echo "REPOS_JSON<<EOF" >> $GITHUB_ENV
          echo "$REPOS_JSON" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update README.md File
        run: |
          python3 -c "
          import os, json
          from datetime import datetime

          # 1. Load the JSON data
          repos_json = os.getenv('REPOS_JSON', '[]')
          repos_data = json.loads(repos_json)
          
          if not repos_data:
              repos_text = '*No recent repository activity found.*'
          else:
              formatted_list = []
              for repo in repos_data:
                  # Convert '2026-05-04T02:58:14Z' to 'May 04, 2026'
                  dt = datetime.strptime(repo['updatedAt'], '%Y-%m-%dT%H:%M:%SZ')
                  clean_date = dt.strftime('%b %d, %Y')
                  
                  # Create a clean Markdown link with the date
                  line = f'* [{repo['name']}]({repo['url']}) - _Updated {clean_date}_'
                  formatted_list.append(line)
              
              repos_text = '\n'.join(formatted_list)
          
          # 2. Update the README file
          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()
          
          start_tag = '<!-- [START_REPO_LIST] -->'
          end_tag = '<!-- [END_REPO_LIST] -->'
          
          start_idx = content.find(start_tag)
          end_idx = content.find(end_tag)
          
          if start_idx != -1 and end_idx != -1:
              new_content = (
                  content[:start_idx + len(start_tag)] + 
                  '\n' + repos_text + '\n' + 
                  content[end_idx:]
              )
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print('README updated with beautiful formatting!')
          "

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # Only commit if there are changes; avoid failing if nothing changed
          git commit -m "docs: update recent projects list [skip ci]" || exit 0
          git push
