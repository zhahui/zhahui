name: Update Repo List
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/user-repository-list@master
        with:
          token: ${{ secrets.GH_PAT_TRACK_ACTIVITIES }}
          type: owner
          limit: 5
          sort: updated
